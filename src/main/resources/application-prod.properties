app.cookie.http-only=true
app.cookie.secure=true
app.cookie.same-site=None
app.cookie.max-age=604800

spring.security.oauth2.client.registration.github.client-id=${GT_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GT_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user
spring.security.oauth2.client.registration.github.redirect-uri=${GT_LOGIN_REDIRECT_URI:https://ada-back.com/api/auth/github/callback}

# Backend-managed GitHub linking flow (no token exposure to frontend)
app.github.oauth.client-id=${GT_CLIENT_ID}
app.github.oauth.client-secret=${GT_CLIENT_SECRET}
app.github.oauth.scope=read:user
app.github.oauth.redirect-uri=${GT_LINK_REDIRECT_URI:https://ada-back.com/api/github/callback}
app.github.oauth.success-redirect=${GT_LINK_SUCCESS_REDIRECT:}
app.github.oauth.failure-redirect=${GT_LINK_FAILURE_REDIRECT:}

# Required for OAuth state signing and token-at-rest encryption
app.security.oauth-state-secret=${OAUTH_STATE_SECRET}
app.security.token-crypto-key-b64=${TOKEN_CRYPTO_KEY_B64}

server.forward-headers-strategy=framework
