# Production overrides for cookie/security
app.cookie.http-only=true
app.cookie.secure=true
app.cookie.same-site=None
app.cookie.max-age=604800

# Reminder: ensure spring.profiles.active=prod is set in prod environment (or via runtime env)
# Example: set your production frontend origin(s) here (comma-separated)
# app.cors.allowed-origin-patterns=https://myapp.example.com,https://www.myapp.example.com

# GitHub OAuth (prod)
# Values must be provided via environment variables (e.g., systemd Environment=...)
spring.security.oauth2.client.registration.github.client-id=${GT_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GT_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/api/auth/github/callback
