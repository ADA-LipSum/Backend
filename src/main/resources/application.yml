spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: proj

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      data-source-properties:
        useUnicode: true
        characterEncoding: utf8
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      keepalive-time: 300000
      connection-timeout: 5000
      validation-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 1000
        jdbc:
          time_zone: Asia/Seoul
          batch_size: 50
        order_inserts: true
        order_updates: true

  jackson:
    time-zone: Asia/Seoul

  devtools:
    restart:
      enabled: false
    add-properties: false

  output:
    ansi:
      enabled: always

  web:
    locale: ko_KR
    locale-resolver: fixed

  main:
    lazy-initialization: true

server:
  port: 8080
  address: 0.0.0.0
  forward-headers-strategy: framework
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    threads:
      max: 300
      min-spare: 30
    accept-count: 200

logging:
  charset:
    console: UTF-8
    file: UTF-8
  level:
    root: INFO
    org:
      springframework:
        web: INFO
      hibernate:
        SQL: ERROR
        type:
          descriptor:
            sql:
              BasicBinder: ERROR

jwt:
  secret: ${JWT_SECRET}
  access-expiration-ms: 60000
  refresh-expiration-ms: 604800000

app:
  auto-increment:
    maintain:
      enabled: true
      tables: users,posts,comments,comments_likes,refresh_token,user_data,post_likes,points_usage_history
      resequence-order: false
      order-column: order_no
      resequence-primary:
        enabled: true
        tables: refresh_token,post,post_likes,comments,comments_likes,user_ban,user_report

  cookie:
    http-only: true
    secure: ${COOKIE_SECURE:false}
    same-site: Lax
    max-age: 604800

  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
